s3:
  bucket: "worldbank-pipeline-gabriel"
  raw_prefix: "raw/world_bank"
  processed_prefix: "processed/world_bank"
  analytics_prefix: "analytics/world_bank"

api:
  base_url: "http://api.worldbank.org/v2"
  indicator: "NY.GDP.MKTP.CD"
  per_page: 1000
  format: "json"

spark:
  app_name: "WorldBankPipeline"
  master: "local[*]"
  log_level: "WARN"

logging:
  level: "INFO"
  format: "%(asctime)s - %(levelname)s - %(message)s"